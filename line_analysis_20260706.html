const ITERS = 100000;

document.getElementById('pwd').addEventListener('keypress', e => {
  if (e.key === 'Enter') tryDecrypt();
});

function b64d(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function tryDecrypt() {
  const pwd = document.getElementById('pwd').value;
  const errEl = document.getElementById('err');
  const btnEl = document.getElementById('btn');
  errEl.textContent = '';
  if (!pwd) { errEl.textContent = 'パスワード入力してください'; return; }
  btnEl.disabled = true;
  btnEl.textContent = '復号中...';
  try {
    const subtle = window.crypto.subtle;
    const passKey = await subtle.importKey('raw', new TextEncoder().encode(pwd), {name:'PBKDF2'}, false, ['deriveKey']);
    const key = await subtle.deriveKey(
      {name:'PBKDF2', salt: b64d(SALT), iterations: ITERS, hash: 'SHA-256'},
      passKey,
      {name:'AES-CBC', length: 256},
      false,
      ['decrypt']
    );
    const decrypted = await subtle.decrypt({name:'AES-CBC', iv: b64d(IV)}, key, b64d(CT));
    const html = new TextDecoder('utf-8').decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.textContent = 'パスワードが違います';
    btnEl.disabled = false;
    btnEl.textContent = '表示する';
    document.getElementById('pwd').select();
  }
}
</script>
